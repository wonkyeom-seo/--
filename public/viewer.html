<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#181b20">
    <title>PDF 뷰어</title>
    <link rel="stylesheet" href="/css/styles.css">
  </head>
  <body class="viewer-body">
    <header class="viewer-header">
      <a id="backLink" class="viewer-back" href="/" aria-label="자료 목록으로 돌아가기">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <button id="fileTreeToggle" class="viewer-files-button" type="button" aria-label="파일 목록 열기" aria-controls="fileTreePanel" aria-expanded="false">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 4h16v16H4zM9 4v16M6.5 9h-1m1 3h-1m1 3h-1"/></svg>
        <span>파일</span>
      </button>
      <div class="viewer-title">
        <strong id="fileName">PDF 불러오는 중</strong>
        <small id="pageSummary">잠시만 기다려 주세요</small>
      </div>
      <button id="printButton" class="viewer-action" type="button" aria-label="인쇄" title="인쇄" disabled>
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M7 9V3h10v6M7 17H5a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2M7 14h10v7H7z"/></svg>
        <span>인쇄</span>
      </button>
      <a id="downloadLink" class="viewer-download" href="#" download>
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 3v12m0 0 5-5m-5 5-5-5M5 21h14"/></svg>
        <span>다운로드</span>
      </a>
    </header>

    <div class="viewer-toolbar" aria-label="PDF 조작">
      <div class="toolbar-group">
        <button id="prevPage" class="tool-button" type="button" aria-label="이전 페이지">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <label class="page-control">
          <input id="pageNumber" type="number" min="1" value="1" aria-label="페이지 번호">
          <span>/ <b id="pageCount">-</b></span>
        </label>
        <button id="nextPage" class="tool-button" type="button" aria-label="다음 페이지">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>
      <div class="toolbar-group">
        <button id="zoomOut" class="tool-button" type="button" aria-label="축소">-</button>
        <span id="zoomValue" class="zoom-value">맞춤</span>
        <button id="zoomIn" class="tool-button" type="button" aria-label="확대">+</button>
        <button id="fitWidth" class="tool-button fit-button" type="button">너비 맞춤</button>
      </div>
      <div class="toolbar-group view-mode-group" aria-label="보기 모드">
        <button id="continuousView" class="tool-button mode-button" type="button" aria-pressed="false" title="아래로 이어서 보기">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M5 3h14v7H5zM5 14h14v7H5z"/></svg>
          <span>연속</span>
        </button>
        <button id="spreadView" class="tool-button mode-button" type="button" aria-pressed="false" title="두 쪽씩 보기">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M3 5h8v14H3zM13 5h8v14h-8z"/></svg>
          <span>2쪽</span>
        </button>
      </div>
    </div>

    <div id="fileTreeBackdrop" class="file-tree-backdrop"></div>
    <aside id="fileTreePanel" class="file-tree-panel" aria-label="파일 목록" aria-hidden="true">
      <div class="file-tree-header">
        <strong>파일</strong>
        <button id="fileTreeClose" class="file-tree-close" type="button" aria-label="파일 목록 닫기">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></svg>
        </button>
      </div>
      <label class="file-tree-search">
        <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m21 21-4.3-4.3m2.3-5.2a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z"/></svg>
        <input id="fileTreeSearch" type="search" placeholder="파일 찾기" autocomplete="off">
      </label>
      <div id="fileTree" class="file-tree" role="tree"></div>
    </aside>

    <main id="viewerStage" class="viewer-stage">
      <div id="viewerStatus" class="viewer-status" role="status">
        <span class="spinner"></span>
        <strong>PDF를 불러오는 중입니다</strong>
        <small>큰 문서는 첫 페이지가 표시되기까지 잠시 걸릴 수 있습니다.</small>
      </div>
      <div id="pdfPages" class="pdf-pages" aria-label="PDF 페이지"></div>
    </main>

    <script type="module" src="/js/viewer.js"></script>
  </body>
</html>
